<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Hub - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.3/dist/Recharts.js"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background-color: #0a0a0a;
      color: #f3f4f6;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const { PieChart, Pie, Cell, ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip } = Recharts;

    function Sidebar({ currentView, setCurrentView }) {
      return (
        <aside className="w-64 bg-[#111111] border-r border-gray-800 flex flex-col h-screen">
          <div className="p-6 border-b border-gray-800">
            <h1 className="text-2xl font-bold text-white" style={{ fontFamily: 'serif' }}>
              Feedback Hub
            </h1>
          </div>
          <nav className="flex-1 p-4 space-y-2">
            <div className="mb-6">
              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">
                DASHBOARDS
              </p>
              <button
                onClick={() => setCurrentView('overview')}
                className={`w-full flex items-center space-x-3 px-3 py-2 rounded-lg transition ${
                  currentView === 'overview'
                    ? 'bg-purple-500/20 text-purple-400'
                    : 'text-gray-400 hover:bg-gray-800'
                }`}
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span>Overview</span>
              </button>
            </div>
            <div className="mb-6">
              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">
                SETTINGS
              </p>
              <button
                onClick={() => setCurrentView('submit')}
                className={`w-full flex items-center space-x-3 px-3 py-2 rounded-lg transition ${
                  currentView === 'submit'
                    ? 'bg-purple-500/20 text-purple-400'
                    : 'text-gray-400 hover:bg-gray-800'
                }`}
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
                <span>Submit Feedback</span>
              </button>
            </div>
          </nav>
          <div className="p-4 border-t border-gray-800">
            <p className="text-xs text-gray-500 text-center">Feedback Platform</p>
          </div>
        </aside>
      );
    }

    function Header() {
      return (
        <header className="bg-[#111111] border-b border-gray-800 px-6 py-4 flex items-center justify-between">
          <nav className="text-sm text-gray-400">
            <span>Dashboards</span>
            <span className="mx-2">/</span>
            <span className="text-gray-200">Overview</span>
          </nav>
          <button className="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-md transition">
            + New Feedback
          </button>
        </header>
      );
    }

    function Dashboard() {
      const sentimentData = [
        { name: 'Positive', value: 85, color: '#6b7280' },
        { name: 'Negative', value: 15, color: '#ef4444' },
      ];

      const categoryData = [
        { name: 'Claims', value: 45 },
        { name: 'Customer Service', value: 32 },
        { name: 'Policy Admin', value: 18 },
        { name: 'Premium Payment', value: 12 },
        { name: 'Other', value: 8 },
      ];

      return (
        <div className="p-6 space-y-6">
          <h1 className="text-3xl font-bold text-white mb-6" style={{ fontFamily: 'serif' }}>
            Feedback Dashboard
          </h1>

          <div className="bg-[#111111] rounded-lg border border-gray-800 p-6">
            <h2 className="text-lg font-semibold text-white mb-4">Sentiment Distribution</h2>
            <div className="flex flex-col items-center">
              <div className="w-full max-w-md" style={{ height: '400px' }}>
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie
                      data={sentimentData}
                      cx="50%"
                      cy="50%"
                      labelLine={false}
                      label={({ name, percent }) => `${name}: ${(percent * 100).toFixed(0)}%`}
                      outerRadius={120}
                      fill="#8884d8"
                      dataKey="value"
                    >
                      {sentimentData.map((entry, index) => (
                        <Cell key={`cell-${index}`} fill={entry.color} />
                      ))}
                    </Pie>
                    <Tooltip />
                  </PieChart>
                </ResponsiveContainer>
              </div>
              <div className="flex items-center space-x-6 mt-4">
                <div className="flex items-center space-x-2">
                  <div className="w-4 h-4 bg-red-500 rounded"></div>
                  <span className="text-sm text-gray-300">negative</span>
                </div>
                <div className="flex items-center space-x-2">
                  <div className="w-4 h-4 bg-gray-500 rounded"></div>
                  <span className="text-sm text-gray-300">positive</span>
                </div>
              </div>
            </div>
          </div>

          <div className="bg-[#111111] rounded-lg border border-gray-800 p-6">
            <h2 className="text-lg font-semibold text-white mb-4">Feedback by Category</h2>
            <div style={{ height: '300px' }}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={categoryData}>
                  <XAxis dataKey="name" tick={{ fill: '#9ca3af' }} axisLine={{ stroke: '#374151' }} />
                  <YAxis tick={{ fill: '#9ca3af' }} axisLine={{ stroke: '#374151' }} />
                  <Tooltip
                    contentStyle={{
                      backgroundColor: '#1f2937',
                      border: '1px solid #374151',
                      borderRadius: '8px',
                      color: '#f3f4f6',
                    }}
                  />
                  <Bar dataKey="value" fill="#3b82f6" radius={[8, 8, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>

          <div className="text-center text-gray-500 text-sm mt-8">
            Feedback Platform
          </div>
        </div>
      );
    }

    function App() {
      const [currentView, setCurrentView] = useState('overview');

      return (
        <div className="flex h-screen overflow-hidden bg-[#0a0a0a]">
          <Sidebar currentView={currentView} setCurrentView={setCurrentView} />
          <div className="flex-1 flex flex-col overflow-hidden">
            <Header />
            <main className="flex-1 overflow-y-auto">
              {currentView === 'overview' && <Dashboard />}
              {currentView === 'submit' && (
                <div className="p-6 text-center text-gray-400">
                  Submit Feedback Form
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
